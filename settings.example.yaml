# netmon settings template.
# Copy to settings.yaml and adjust for your environment:
#     cp settings.example.yaml settings.yaml
# settings.yaml is gitignored so your local tweaks stay out of the repo.

syslog:
  host: "0.0.0.0"
  port: 514

storage:
  database: "/data/netmon.db"
  retention_days: 30      # delete logs older than this (hourly cleanup). Lower = less disk.
  store_raw: true         # keep the full raw log line per row (good for debugging).
                          # set false to roughly halve storage if you don't need it.

detection:
  rules:
    blocked_threshold: 100        # Alert if >100 blocks/min from one IP
    port_scan_threshold: 20       # Alert if >20 ports hit in 60 seconds
    suspicious_ports: [23, 445, 3389, 5900]

  statistical:
    enabled: true
    learning_days: 7
    deviation_threshold: 3.0      # Alert at 3 standard deviations

  correlation:
    enabled: true                 # Compare traffic against your pfSense ruleset
    ruleset_path: "/config/rules.yaml"  # generated by tools.extract_pfsense
    # action_mismatch (rule says X, traffic did Y) always alerts — the high-signal one.
    # no_matching_rule is mostly default-deny noise; enable for audits, off for live.
    alert_on_no_match: false

alerts:
  stdout: true

  # Append each alert as a JSON line. Feeds external dashboards like
  # cyd-server-monitor, which counts recent alerts from this file.
  jsonl:
    enabled: false
    path: "/data/alerts.jsonl"

  # Publish alerts to MQTT with Home Assistant MQTT Discovery. HA auto-creates an
  # event entity (event.netmon_alert) and a sensor (sensor.netmon_last_alert) on
  # one "netmon" device — no manual HA config. Filter in your HA automation, e.g.
  # trigger on the event entity where event_type == "critical" to notify your phone.
  mqtt:
    enabled: false
    host: "192.168.1.220"      # MQTT broker (e.g. the HA host running Mosquitto)
    port: 1883
    username: ""               # optional; leave blank for anonymous brokers
    password: ""
    base_topic: "netmon"       # netmon/status (availability), netmon/event, netmon/alert
    discovery_prefix: "homeassistant"  # must match HA's MQTT discovery prefix
    min_severity: "info"       # info | warning | critical — gate which alerts publish
